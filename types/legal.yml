# A CLAUSE extracted from one of YOUR ingested contracts — materialized on first traversal of
# (d:Document)-[:HAS_CLAUSES]->(c:Clause), persisted per record (cache kind graph on the producer),
# and served from the graph until the document's text changes. Categories follow the CUAD expert
# taxonomy (41 labels: Parties, Agreement Date, Renewal Term, Governing Law, License Grant,
# Cap On Liability, Uncapped Liability, Termination For Convenience, Anti-Assignment, Audit Rights,
# Insurance, Non-Compete, Exclusivity, Ip Ownership Assignment, Source Code Escrow, …).
#   MATCH (:Concept {value:'acme'})-[:RELEVANT_TO]->(d:Document)
#   MATCH (d)-[:HAS_CLAUSES]->(c:Clause) WHERE c.category = 'Cap On Liability' RETURN c.text
- name: Clause
  visibility: internal
  userAnchor: false
  description: "A contract clause extracted from one of YOUR ingested documents, typed by CUAD category. Reach it ONLY from a bound Document via HAS_CLAUSES — e.g. MATCH (d:Document …)-[:HAS_CLAUSES]->(c:Clause) RETURN c.category, c.text. When the user wants the clauses THEMSELVES, RETURN c — the whole node renders as an entity. Filter with c.category (e.g. 'Cap On Liability', 'Renewal Term', 'Governing Law', 'License Grant', 'Parties'). A clause CITING another section of the same contract carries a real (c1)-[:REFERS_TO]->(c2) edge to the cited sibling — traverse it for 'what does the section cited by X say'. To SUMMARIZE clauses, aggregate over c.text — never over document metadata."
  virtualJoins:
    - anchorLabel: Document
      relationship: HAS_CLAUSES
      keyField: uri
      recordKeyField: docUri
      producer: clauseExtraction
      description: "On-demand, graph-cached clause extraction over the anchored contract's full text. First traversal extracts every clause as a typed row; repeats are plain graph hits until the document changes. One row per clause: c.category (CUAD taxonomy), c.text (the verbatim clause), c.sourceChunkId (provenance)."
  # FEW-SHOT for the text-to-cypher generator: clause questions route through HAS_CLAUSES rows,
  # never summarize() over metadata and never a naked Clause scan. Synthetic 'acme' placeholders.
  examples:
    - q: "what does my contract with acme say about liability?"
      cypher: |
        MATCH (:Concept {value:'acme'})-[:RELEVANT_TO]->(d:Document)
        MATCH (d)-[:HAS_CLAUSES]->(c:Clause)
        WHERE c.category IN ['Cap On Liability', 'Uncapped Liability']
        RETURN c.category AS category, c.text AS clause
    - q: "does my acme agreement auto-renew?"
      cypher: |
        MATCH (:Concept {value:'acme'})-[:RELEVANT_TO]->(d:Document)
        MATCH (d)-[:HAS_CLAUSES]->(c:Clause)
        WHERE c.category IN ['Renewal Term', 'Notice Period To Terminate Renewal']
        RETURN c.category AS category, c.text AS clause
    # A WHICH-contract question must DISCRIMINATE in the clause text, not just list every
    # contract's clause of that category: seed the corpus noun, then filter c.text by the
    # question's distinguishing term.
    - q: "which of my contracts is governed by acme law?"
      cypher: |
        MATCH (:Concept {value:'contract'})-[:RELEVANT_TO]->(d:Document)
        MATCH (d)-[:HAS_CLAUSES]->(c:Clause)
        WHERE c.category = 'Governing Law' AND toLower(c.text) CONTAINS 'acme'
        RETURN d.title AS contract, c.text AS clause
    # When the user asks for the clauses THEMSELVES ("show me", "list the clauses"), return the
    # WHOLE node — clauses are first-class entities (name, category, text, section) and a full
    # node renders as an entity; a scalar projection does not.
    - q: "show me the termination clauses in my acme contract"
      cypher: |
        MATCH (:Concept {value:'acme'})-[:RELEVANT_TO]->(d:Document)
        MATCH (d)-[:HAS_CLAUSES]->(c:Clause)
        WHERE c.category IN ['Termination For Convenience', 'Post-Termination Services']
        RETURN c
    # CITATION-COUNT questions are STRUCTURAL — the graph already carries them. Count the
    # c.references list (sections the clause claims to cite) or hop the real REFERS_TO edge;
    # NEVER re-derive citations from c.text with an LLM primitive (extract()/ai_*): the
    # structured answer is already extracted, exact, and free.
    - q: "which clauses cite two or more other clauses?"
      cypher: |
        MATCH (:Concept {value:'contract'})-[:RELEVANT_TO]->(d:Document)
        MATCH (d)-[:HAS_CLAUSES]->(c:Clause)
        WHERE size(c.references) >= 2
        RETURN d.title AS contract, c
    # When the user NAMES a document ("my acme agreement"), select it by its identifying METADATA —
    # title OR source_name (the filename the user uploaded; an extracted title is often generic
    # boilerplate like 'SERVICES AND HOSTING AGREEMENT' that does not carry the party name the user
    # asks by). Content relevance would also match siblings that merely mention the name, and their
    # clauses would leak into the answer.
    - q: "what is the governing law of my acme hosting agreement?"
      cypher: |
        MATCH (d:Document) WHERE toLower(d.title) CONTAINS 'acme' OR toLower(d.source_name) CONTAINS 'acme'
        MATCH (d)-[:HAS_CLAUSES]->(c:Clause)
        WHERE c.category = 'Governing Law'
        RETURN d.title AS contract, c.text AS clause
  properties:
    id:
      description: "Synthesized identity — producer:owner:documentUri:hash:index. Stable while the document is unchanged."
      metadata:
        identity: "true"
    name: "Short display name — the clause's own heading, or '<category> §<section>'. Clauses are first-class entities: committed with real (d)-[:HAS_CLAUSES]->(c) containment and an __Entity__ stamp, so they surface in entity views and plain Cypher alike."
    docUri: "URI of the contract document this clause was extracted from (= the anchor's uri)."
    category:
      description: "CUAD clause category — e.g. Parties, Agreement Date, Effective Date, Expiration Date, Renewal Term, Notice Period To Terminate Renewal, Governing Law, Most Favored Nation, Non-Compete, Exclusivity, No-Solicit Of Customers, No-Solicit Of Employees, Non-Disparagement, Termination For Convenience, Rofr/Rofo/Rofn, Change Of Control, Anti-Assignment, Revenue/Profit Sharing, Price Restrictions, Minimum Commitment, Ip Ownership Assignment, Joint Ip Ownership, License Grant, Non-Transferable License, Irrevocable Or Perpetual License, Source Code Escrow, Post-Termination Services, Audit Rights, Uncapped Liability, Cap On Liability, Liquidated Damages, Warranty Duration, Insurance, Covenant Not To Sue, Third Party Beneficiary."
      # The ENFORCED vocabulary (must mirror the clauseExtraction prompt's list exactly): the extract
      # backend DROPS any record whose category is off this list — the prompt asks the model to skip
      # off-taxonomy clauses, but a model that finds a real Force Majeure clause labels it anyway.
      validation:
        - rule: oneOf
          values:
            - Parties
            - Agreement Date
            - Effective Date
            - Expiration Date
            - Renewal Term
            - Notice Period To Terminate Renewal
            - Governing Law
            - Most Favored Nation
            - Non-Compete
            - Exclusivity
            - No-Solicit Of Customers
            - No-Solicit Of Employees
            - Non-Disparagement
            - Termination For Convenience
            - Rofr/Rofo/Rofn
            - Change Of Control
            - Anti-Assignment
            - Revenue/Profit Sharing
            - Price Restrictions
            - Minimum Commitment
            - Volume Restriction
            - Ip Ownership Assignment
            - Joint Ip Ownership
            - License Grant
            - Non-Transferable License
            - Affiliate License-Licensor
            - Affiliate License-Licensee
            - Unlimited/All-You-Can-Eat-License
            - Irrevocable Or Perpetual License
            - Source Code Escrow
            - Post-Termination Services
            - Audit Rights
            - Uncapped Liability
            - Cap On Liability
            - Liquidated Damages
            - Warranty Duration
            - Insurance
            - Covenant Not To Sue
            - Third Party Beneficiary
    text: "The verbatim clause text as it appears in the contract."
    answer: "The lawyer-style normalized answer where one exists (e.g. '30 days' for a notice period, 'Delaware' for governing law)."
    section: "The clause's OWN section number as written in the contract (e.g. '10.2', '14.3', '6.1') — absent when the excerpt shows none."
    title: "The clause's own heading as written (e.g. 'Effect of Termination', 'Choice of Law; Arbitration; Venue') — absent when the excerpt shows none."
    references:
      description: "Section numbers this clause CITES ('as discussed in Section 9 of this Agreement' → '9') — cross-references to sibling clauses of the same contract, joinable via c2.section IN c1.references. Absent when the clause cites nothing. Citation COUNTS are structural: filter with size(c.references) >= N or hop the real REFERS_TO edge — never re-derive citations from c.text."
      cardinality: LIST
    sourceChunkId: "Provenance — the ingested chunk this clause was extracted from."
